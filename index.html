<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行测速算特训营</title>
    <style>
        :root {
            --bg-color: #f1f8e9; --card-bg: #ffffff; --primary: #2e7d32; --primary-light: #c8e6c9;   
            --text-main: #1b5e20; --text-sub: #666666; --success: #4caf50; --danger: #f44336; --border: #a5d6a7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center;}
        .app-container { width: 100%; max-width: 500px; background: var(--bg-color); min-height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; font-size: 18px; font-weight: bold; color: var(--primary); }
        .heatmap-container { background: var(--card-bg); margin: 0 15px 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .heatmap-grid { display: flex; gap: 5px; justify-content: space-between; }
        .heatmap-cell { flex: 1; aspect-ratio: 1; background: #ebedf0; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: 0.3s;}
        .heatmap-cell.level-1 { background: #c6e48b; } .heatmap-cell.level-2 { background: #7bc96f; } .heatmap-cell.level-3 { background: #239a3b; color: white;}
        #home-screen { padding: 0 15px 15px; display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; }
        .section-title { font-weight: bold; font-size: 13px; color: var(--text-sub); margin-top: 5px; display: flex; align-items: center; gap: 5px; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .module-btn { background: var(--primary-light); color: var(--primary); border-radius: 8px; padding: 12px 2px; text-align: center; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; border: 2px solid transparent;}
        .module-btn.active { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-2px); }
        .module-btn span.sub { font-size: 9px; opacity: 0.8; margin-top: 4px; font-weight: normal; }
        .settings-row { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px 15px; border-radius: 12px; font-size: 14px; margin-top: 5px;}
        .setting-select { border: none; background: #f1f8e9; color: var(--primary); padding: 5px; border-radius: 6px; font-weight: bold; }
        .start-btn { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 15px; font-size: 18px; font-weight: bold; margin: 15px 0 30px; box-shadow: 0 4px 15px rgba(46,125,50,0.3);}
        /* 练习界面样式 */
        #practice-screen, #result-screen, #memorize-screen { display: none; flex-direction: column; height: 100vh; background: #fff; padding: 20px; }
        .question-text { font-size: 32px; font-weight: 900; margin: 30px 0 10px; text-align: center; }
        .choice-area { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 20px; }
        .choice-btn { padding: 18px; border: 2px solid var(--border); border-radius: 12px; font-size: 18px; font-weight: bold; background: #fafafa; }
        .choice-btn.correct-ans { background: var(--success); color: white; }
        .choice-btn.wrong-ans { background: var(--danger); color: white; }
        .trick-info { background: #fff3e0; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; font-size: 14px; }
        .next-btn { background: var(--primary); color: white; padding: 15px; border-radius: 12px; border: none; width: 100%; margin-top: 20px; font-weight: bold; display: none; }
        /* 结算卡片 */
        .result-card { text-align: center; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .grade-circle { width: 70px; height: 70px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; margin: 10px; }
        .grade-s { background: #fff3e0; color: #e65100; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="home-screen">
        <div class="header"><span>速算特训营 V8</span></div>
        
        <div class="heatmap-container">
            <div class="heatmap-grid" id="heatmap"></div>
        </div>

        <div class="section-title">🚀 核心计算 (九宫格)</div>
        <div class="grid-container" id="module-grid">
            <div class="module-btn active" onclick="selectModule('fractionTest', this)">百化分<span class="sub">1/n 互化</span></div>
            <div class="module-btn" onclick="selectModule('growth', this)">增长量<span class="sub">n+1 法则</span></div>
            <div class="module-btn" onclick="selectModule('base', this)">基期量<span class="sub">化除为乘</span></div>
            <div class="module-btn" onclick="selectModule('div5', this)">截位直除<span class="sub">5位除3位</span></div>
            <div class="module-btn" onclick="selectModule('mulEst', this)">乘法估算<span class="sub">一进一舍</span></div>
            <div class="module-btn" onclick="selectModule('weight', this)">比重计算<span class="sub">部分/整体</span></div>
            <div class="module-btn" onclick="selectModule('average', this)">平均数<span class="sub">总数/个数</span></div>
            <div class="module-btn" onclick="selectModule('ge-nian', this)">隔年增长<span class="sub">r1+r2+r1r2</span></div>
            <div class="module-btn" onclick="selectModule('judge', this)">比重判定<span class="sub">上升/下降</span></div>
        </div>

        <div class="settings-row">
            <span>答题模式</span>
            <select id="input-mode" class="setting-select">
                <option value="choice">单项选择</option>
                <option value="input">硬核心算</option>
            </select>
        </div>
        <button class="start-btn" onclick="startPractice()">开始特训</button>
    </div>

    <div id="practice-screen">
        <div style="display:flex; justify-content: space-between;">
            <span onclick="exitPractice()">返回</span>
            <span id="progress-text">1/10</span>
            <span id="timer-text">00:00</span>
        </div>
        <div class="question-text" id="q-text">题目加载中...</div>
        <div id="q-hint" style="text-align:center; color:#666; font-size:14px;"></div>

        <div id="area-choice" class="choice-area">
            <button class="choice-btn" id="c-btn-0" onclick="handleChoice(0)"></button>
            <button class="choice-btn" id="c-btn-1" onclick="handleChoice(1)"></button>
            <button class="choice-btn" id="c-btn-2" onclick="handleChoice(2)"></button>
            <button class="choice-btn" id="c-btn-3" onclick="handleChoice(3)"></button>
        </div>
        
        <div id="area-input" style="display:none; margin-top:20px;">
            <input type="number" id="ans-input" style="width:100%; padding:15px; font-size:24px; border:2px solid #ddd; border-radius:12px;" placeholder="输入数字">
            <button class="start-btn" style="width:100%" onclick="handleInputSubmit()">提交</button>
        </div>

        <div class="trick-info" id="trick-box"></div>
        <button class="next-btn" id="btn-next" onclick="nextQuestion()">下一题</button>
    </div>

    <div id="result-screen">
        <div class="result-card">
            <h2>测评报告</h2>
            <div class="grade-circle grade-s" id="res-grade">S</div>
            <p id="res-stats"></p>
            <div id="r-commentary" style="margin: 20px 0; padding:15px; background:#f9fbe7; border-radius:10px; font-size:14px;"></div>
            <button class="start-btn" style="width:100%" onclick="location.reload()">回首页</button>
        </div>
    </div>
</div>

<script>
    let currentModule = 'fractionTest';
    let currentAnswer = 0;
    let currentTolerance = 0.02; 
    let currentTrick = "";
    let correctCount = 0;
    let currentQIndex = 1;
    let totalQuestions = 10;
    let timerInterval;
    let seconds = 0;
    let options = [];

    const fractions = [{f:'1/3',v:33.3},{f:'1/6',v:16.7},{f:'1/7',v:14.3},{f:'1/8',v:12.5},{f:'1/9',v:11.1},{f:'1/11',v:9.1},{f:'1/12',v:8.3},{f:'1/13',v:7.7},{f:'1/14',v:7.1},{f:'1/15',v:6.7},{f:'1/16',v:6.3},{f:'1/17',v:5.9},{f:'1/18',v:5.6},{f:'1/19',v:5.3}];

    function selectModule(mod, el) {
        currentModule = mod;
        document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function startPractice() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('practice-screen').style.display = 'flex';
        seconds = 0;
        timerInterval = setInterval(() => { seconds++; document.getElementById('timer-text').innerText = seconds + "s"; }, 1000);
        loadQuestion();
    }

    function loadQuestion() {
        document.getElementById('trick-box').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('progress-text').innerText = `${currentQIndex}/${totalQuestions}`;
        
        let mode = document.getElementById('input-mode').value;
        document.getElementById('area-choice').style.display = mode === 'choice' ? 'grid' : 'none';
        document.getElementById('area-input').style.display = mode === 'input' ? 'block' : 'none';

        generateQuestion();
        if(mode === 'choice') generateOptions();
    }

    function generateQuestion() {
        let q = document.getElementById('q-text');
        let h = document.getElementById('q-hint');

        if(currentModule === 'fractionTest') {
            let item = fractions[Math.floor(Math.random()*fractions.length)];
            q.innerText = `${item.f} ≈ ? %`;
            currentAnswer = item.v; currentTolerance = 0.5;
            currentTrick = `记住口诀：${item.f} 等于 ${item.v}%`;
        } 
        else if(currentModule === 'growth') {
            let val = Math.floor(Math.random()*5000 + 1000);
            let item = fractions[Math.floor(Math.random()*fractions.length)];
            let n = Math.round(100/item.v);
            q.innerHTML = `现期：${val}<br>增长率：${item.v}%`;
            h.innerText = "求增长量";
            currentAnswer = val / (n + 1); currentTolerance = currentAnswer * 0.05;
            currentTrick = `n+1法则：增长率 ≈ 1/${n}，增长量 = 现期 / (n+1) = ${val}/${n+1}`;
        }
        else if(currentModule === 'ge-nian') {
            let r1 = Math.floor(Math.random()*15 + 5);
            let r2 = Math.floor(Math.random()*15 + 5);
            q.innerText = `r1=${r1}%, r2=${r2}%`;
            h.innerText = "求隔年增长率";
            currentAnswer = r1 + r2 + (r1*r2/100); currentTolerance = 0.5;
            currentTrick = `隔年公式：r1 + r2 + r1*r2。注意 r1*r2 要除以 100。`;
        }
        else if(currentModule === 'div5') {
            let a = Math.floor(Math.random()*80000 + 10000);
            let b = Math.floor(Math.random()*800 + 200);
            q.innerText = `${a} ÷ ${b} = ?`;
            currentAnswer = a / b; currentTolerance = currentAnswer * 0.03;
            currentTrick = `截位直除：分母截前三位（${b}），分子保持不动进行首位试商。`;
        }
        else if(currentModule === 'mulEst') {
            let a = Math.floor(Math.random()*800 + 100);
            let b = Math.floor(Math.random()*80 + 10);
            q.innerText = `${a} × ${b} = ?`;
            currentAnswer = a * b; currentTolerance = currentAnswer * 0.05;
            currentTrick = `一进一舍：一个数向上截位，另一个向下截位，保持乘积稳定。`;
        }
        else if(currentModule === 'judge') {
            let pr = Math.floor(Math.random()*20 + 5);
            let tr = Math.floor(Math.random()*20 + 5);
            q.innerHTML = `部分增长率：${pr}%<br>整体增长率：${tr}%`;
            h.innerText = "比重与去年相比？";
            currentAnswer = pr > tr ? 1 : 2; // 1为上升 2为下降
            currentTrick = `口诀：部分率 > 整体率 → 比重上升；反之下降。`;
        }
        // ... 其他模块类似补充 ...
        else {
            q.innerText = "模块开发中";
        }
    }

    function generateOptions() {
        options = [currentAnswer];
        while(options.length < 4) {
            let offset = currentModule === 'judge' ? (Math.random() > 0.5 ? 1 : -1) : (1 + (Math.random()*0.4 - 0.2));
            let alt = currentModule === 'judge' ? (options.includes(1)?2:1) : currentAnswer * offset;
            if(!options.includes(alt)) options.push(alt);
        }
        options.sort(() => Math.random() - 0.5);
        for(let i=0; i<4; i++) {
            let btn = document.getElementById('c-btn-'+i);
            btn.className = 'choice-btn';
            if(currentModule === 'judge') {
                btn.innerText = options[i] === 1 ? "上升" : "下降";
            } else {
                btn.innerText = options[i] > 100 ? Math.round(options[i]) : options[i].toFixed(1);
            }
        }
    }

    function handleChoice(idx) {
        let isCorrect = false;
        if(currentModule === 'judge') {
            isCorrect = options[idx] === currentAnswer;
        } else {
            isCorrect = Math.abs(options[idx] - currentAnswer) <= currentTolerance;
        }
        showFeedback(isCorrect, idx);
    }

    function showFeedback(correct, idx) {
        if(correct) {
            correctCount++;
            document.getElementById('c-btn-'+idx).classList.add('correct-ans');
            setTimeout(nextQuestion, 500);
        } else {
            document.getElementById('c-btn-'+idx).classList.add('wrong-ans');
            document.getElementById('trick-box').innerHTML = `<b>解析：</b>${currentTrick}`;
            document.getElementById('trick-box').style.display = 'block';
            document.getElementById('btn-next').style.display = 'block';
        }
    }

    function nextQuestion() {
        if(currentQIndex < totalQuestions) {
            currentQIndex++;
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        clearInterval(timerInterval);
        document.getElementById('practice-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'flex';
        let acc = (correctCount/totalQuestions)*100;
        document.getElementById('res-stats').innerText = `正确率：${acc}% | 平均耗时：${(seconds/totalQuestions).toFixed(1)}s`;
        
        let comment = acc >= 90 ? "🏆 资料分析战神！速度与准度并存。" : (acc >= 60 ? "🐢 速度尚可，但截位还要再大胆一点！" : "📉 建议去背诵卡片强化一下‘百化分’。");
        document.getElementById('r-commentary').innerText = `导师评价：${comment}`;
    }

    function exitPractice() { clearInterval(timerInterval); location.reload(); }
</script>
</body>
</html>
