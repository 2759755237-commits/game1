<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资料分析速算冲刺营 V2</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px 10px;
        }

        .container {
            width: 100%; max-width: 500px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* 顶部统计与计时器 */
        .header {
            background: var(--primary);
            color: white; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .stats { font-size: 14px; font-weight: 500; }
        .timer-box { display: flex; align-items: center; gap: 10px; }
        .timer { font-size: 24px; font-weight: 800; font-variant-numeric: tabular-nums; }
        .timer-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* 模块导航 */
        .nav-scroll {
            width: 100%; overflow-x: auto; white-space: nowrap;
            background: var(--card-bg); border-bottom: 1px solid var(--border);
            padding: 10px;
        }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-btn {
            display: inline-block; padding: 8px 16px; margin-right: 8px;
            border-radius: 20px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text-sub);
            font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .nav-btn.active { background: #eff6ff; color: var(--primary); border-color: var(--primary); }

        /* 答题区 */
        .question-area { padding: 30px 20px; text-align: center; flex: 1; }
        .module-title { font-size: 12px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .question-text { font-size: 32px; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }
        .question-desc { font-size: 14px; color: var(--text-sub); margin-bottom: 30px; }

        /* 输入与反馈 */
        .input-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .answer-input {
            width: 100%; max-width: 250px; text-align: center;
            font-size: 28px; font-weight: bold; padding: 15px;
            border: 2px solid var(--border); border-radius: 12px;
            outline: none; color: var(--text-main); transition: 0.2s;
        }
        .answer-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        
        .action-btns { display: flex; gap: 10px; width: 100%; max-width: 250px; }
        .btn-submit, .btn-next { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-submit { background: var(--primary); color: white; }
        .btn-submit:active { background: var(--primary-hover); }
        .btn-next { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); display: none; }

        /* 结果与解析 */
        .feedback { min-height: 24px; margin-top: 15px; font-size: 16px; font-weight: bold; }
        .feedback.correct { color: var(--success); }
        .feedback.wrong { color: var(--danger); }
        
        .trick-box {
            margin-top: 20px; padding: 15px; background: #fffbeb; border: 1px solid #fde68a;
            border-radius: 8px; text-align: left; font-size: 13px; color: #92400e; display: none;
        }
        .trick-toggle { font-size: 12px; color: var(--primary); cursor: pointer; text-decoration: underline; margin-top: 15px; display: inline-block; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="stats">
            ✅ 正确: <span id="stat-correct">0</span> / <span id="stat-total">0</span>
            <br>🎯 准确率: <span id="stat-rate">0%</span>
        </div>
        <div class="timer-box">
            <button class="timer-btn" id="timer-toggle" onclick="toggleTimer()">开启 60s 挑战</button>
            <div class="timer" id="timer-display" style="display: none;">60</div>
        </div>
    </div>

    <div class="nav-scroll" id="nav-container">
        <div class="nav-btn active" onclick="switchModule('fraction', this)">分数互化</div>
        <div class="nav-btn" onclick="switchModule('growth', this)">增长量(n+1)</div>
        <div class="nav-btn" onclick="switchModule('base', this)">基期量估算</div>
        <div class="nav-btn" onclick="switchModule('division', this)">截位直除</div>
        <div class="nav-btn" onclick="switchModule('multiply', this)">截位连乘</div>
    </div>

    <div class="question-area">
        <div class="module-title" id="module-title">阶段一：肌肉记忆</div>
        <div class="question-text" id="question">1 / 6 = ?</div>
        <div class="question-desc" id="question-desc">请输入对应的百分数 (无需输入 % 号)</div>

        <div class="input-group">
            <input type="number" id="answer-input" class="answer-input" placeholder="输入答案" inputmode="decimal" autocomplete="off">
            
            <div class="action-btns">
                <button class="btn-submit" id="btn-submit" onclick="checkAnswer()">验证答案</button>
                <button class="btn-next" id="btn-next" onclick="generateQuestion()">下一题 (Enter)</button>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>
        <div class="trick-toggle" id="trick-toggle" onclick="toggleTrick()">💡 查看速算思路</div>
        <div class="trick-box" id="trick-box"></div>
    </div>
</div>

<script>
    // --- 数据与核心状态 ---
    const fractions = [
        { f: '1/2', v: 50.0 }, { f: '1/3', v: 33.3 }, { f: '1/4', v: 25.0 }, { f: '1/5', v: 20.0 },
        { f: '1/6', v: 16.7 }, { f: '1/7', v: 14.3 }, { f: '1/8', v: 12.5 }, { f: '1/9', v: 11.1 },
        { f: '1/11', v: 9.1 }, { f: '1/12', v: 8.3 }, { f: '1/13', v: 7.7 }, { f: '1/14', v: 7.1 },
        { f: '1/15', v: 6.7 }, { f: '1/16', v: 6.3 }, { f: '1/17', v: 5.9 }
    ];

    let currentModule = 'fraction';
    let currentAnswer = 0;
    let currentTolerance = 0;
    let currentTrick = "";
    
    let stats = { correct: 0, total: 0 };
    let timerInterval = null;
    let timeLeft = 60;
    let isTimeAttack = false;

    // --- 界面元素绑定 ---
    const elQuestion = document.getElementById('question');
    const elDesc = document.getElementById('question-desc');
    const elInput = document.getElementById('answer-input');
    const elFeedback = document.getElementById('feedback');
    const elSubmitBtn = document.getElementById('btn-submit');
    const elNextBtn = document.getElementById('btn-next');
    const elTrickBox = document.getElementById('trick-box');
    const elTrickToggle = document.getElementById('trick-toggle');

    // --- 题库生成逻辑 ---

    function generateQuestion() {
        elInput.value = '';
        elInput.disabled = false;
        elInput.focus();
        elFeedback.innerText = '';
        elFeedback.className = 'feedback';
        elSubmitBtn.style.display = 'block';
        elNextBtn.style.display = 'none';
        elTrickBox.style.display = 'none';

        if (currentModule === 'fraction') genFraction();
        else if (currentModule === 'growth') genGrowth();
        else if (currentModule === 'base') genBase();
        else if (currentModule === 'division') genDivision();
        else if (currentModule === 'multiply') genMultiply();
    }

    function genFraction() {
        let item = fractions[Math.floor(Math.random() * fractions.length)];
        elQuestion.innerText = `${item.f} = ? %`;
        elDesc.innerText = '请输入百分数数值，允许误差 ±0.2';
        currentAnswer = item.v;
        currentTolerance = 0.2;
        currentTrick = `背诵口诀：${item.f} 约等于 ${item.v}%。这是资料分析的基础地基，必须条件反射。`;
    }

    function genGrowth() {
        // 生成增长量题目，优先使用特殊分数
        let item = fractions[Math.floor(Math.random() * fractions.length)];
        let currentVal = Math.floor(Math.random() * 5000) + 3000; // 3000-8000
        let isIncrease = Math.random() > 0.3; // 70%概率是正增长
        
        let rateStr = (item.v + (Math.random()*0.4 - 0.2)).toFixed(1); // 加上一点点随机扰动，模拟真实题目
        
        elQuestion.innerText = `现期量: ${currentVal}\n${isIncrease?'同比增加':'同比下降'}: ${rateStr}%`;
        elDesc.innerText = `求${isIncrease?'增长量':'减少量'}？允许误差 ±3%`;
        
        let n = Math.round(100 / item.v);
        
        if (isIncrease) {
            currentAnswer = currentVal / (n + 1);
            currentTrick = `看到 ${rateStr}%，直接想到 1/${n}。\n根据 n+1 法则，增长量 ≈ ${currentVal} ÷ (${n} + 1) = ${currentVal} ÷ ${n+1} ≈ ${(currentVal/(n+1)).toFixed(1)}。`;
        } else {
            currentAnswer = currentVal / (n - 1);
            currentTrick = `看到下降 ${rateStr}%，直接想到 1/${n}。\n根据 n-1 法则，减少量 ≈ ${currentVal} ÷ (${n} - 1) = ${currentVal} ÷ ${n-1} ≈ ${(currentVal/(n-1)).toFixed(1)}。`;
        }
        currentTolerance = currentAnswer * 0.03; // 3% 的误差
    }

    function genBase() {
        let currentVal = Math.floor(Math.random() * 7000) + 2000;
        let rate = Math.floor(Math.random() * 25) + 5; // 5% - 30%
        let isIncrease = Math.random() > 0.5;

        elQuestion.innerText = `现期量: ${currentVal}\n${isIncrease?'同比增加':'同比下降'}: ${rate}%`;
        elDesc.innerText = `求基期量？允许误差 ±2%`;

        let realRate = isIncrease ? (1 + rate/100) : (1 - rate/100);
        currentAnswer = currentVal / realRate;
        currentTolerance = currentAnswer * 0.02;

        let approxCurrent = Math.round(currentVal/10)*10;
        let approxRate = realRate.toFixed(2);
        currentTrick = `基期量公式：现期量 / (1±r)。\n建议截位直除估算：计算 ${approxCurrent} ÷ ${approxRate} 即可快速选出答案。`;
    }

    function genDivision() {
        let num1 = Math.floor(Math.random() * 90000) + 10000; // 5位数
        let num2 = Math.floor(Math.random() * 900) + 100;    // 3位数
        
        elQuestion.innerText = `${num1} ÷ ${num2} = ?`;
        elDesc.innerText = `截位直除估算。允许误差 ±2%`;
        
        currentAnswer = num1 / num2;
        currentTolerance = currentAnswer * 0.02;
        
        let roundNum2 = Math.round(num2/10)*10;
        currentTrick = `截位直除：分母截取前两位（四舍五入）。\n把 ${num2} 看作 ${roundNum2}，计算 ${num1} ÷ ${roundNum2}，极大地加快口算速度。`;
    }

    function genMultiply() {
        let num1 = Math.floor(Math.random() * 900) + 100; // 3位数
        let num2 = Math.floor(Math.random() * 90) + 10;   // 2位数
        
        elQuestion.innerText = `${num1} × ${num2} = ?`;
        elDesc.innerText = `乘法估算。允许误差 ±3%`;
        
        currentAnswer = num1 * num2;
        currentTolerance = currentAnswer * 0.03;
        
        currentTrick = `乘法估算通常“一进一舍”保持平衡。\n根据选项差距，也可直接取整百整十相乘来锁定数量级。`;
    }

    // --- 交互与验证逻辑 ---

    function checkAnswer() {
        let userVal = parseFloat(elInput.value);
        if (isNaN(userVal)) {
            alert("请输入数字！"); return;
        }

        stats.total++;
        let diff = Math.abs(userVal - currentAnswer);
        let isCorrect = diff <= currentTolerance;

        if (isCorrect) {
            stats.correct++;
            elFeedback.innerText = `✅ 正确！(标准值: ${currentAnswer.toFixed(1)})`;
            elFeedback.className = 'feedback correct';
            // 如果是在挑战模式，答对自动下一题
            if(isTimeAttack) {
                setTimeout(generateQuestion, 400);
            }
        } else {
            elFeedback.innerText = `❌ 错误。准确值约为: ${currentAnswer.toFixed(1)}`;
            elFeedback.className = 'feedback wrong';
            elTrickBox.innerHTML = `<strong>💡 速算思路：</strong><br>${currentTrick.replace(/\n/g, '<br>')}`;
            elTrickBox.style.display = 'block';
        }

        updateStats();
        
        if(!isTimeAttack || !isCorrect) {
            elInput.disabled = true;
            elSubmitBtn.style.display = 'none';
            elNextBtn.style.display = 'block';
            elNextBtn.focus();
        }
    }

    function updateStats() {
        document.getElementById('stat-correct').innerText = stats.correct;
        document.getElementById('stat-total').innerText = stats.total;
        let rate = stats.total === 0 ? 0 : Math.round((stats.correct / stats.total) * 100);
        document.getElementById('stat-rate').innerText = rate + '%';
    }

    function toggleTrick() {
        elTrickBox.innerHTML = `<strong>💡 速算思路：</strong><br>${currentTrick.replace(/\n/g, '<br>')}`;
        elTrickBox.style.display = elTrickBox.style.display === 'block' ? 'none' : 'block';
    }

    function switchModule(mod, btnElement) {
        if(isTimeAttack) {
            alert("请先结束当前计时挑战！"); return;
        }
        currentModule = mod;
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        
        const titles = {
            'fraction': '阶段一：核心基建',
            'growth': '高频考点：N+1 法则',
            'base': '基础计算：基期现期',
            'division': '核心能力：截位直除',
            'multiply': '拓展：连乘估算'
        };
        document.getElementById('module-title').innerText = titles[mod];
        generateQuestion();
    }

    // --- 计时挑战模式 ---
    function toggleTimer() {
        const btn = document.getElementById('timer-toggle');
        const display = document.getElementById('timer-display');
        
        if (isTimeAttack) {
            // 结束挑战
            clearInterval(timerInterval);
            isTimeAttack = false;
            btn.innerText = "开启 60s 挑战";
            btn.style.background = "rgba(255,255,255,0.2)";
            display.style.display = "none";
            alert(`挑战结束！\n在60秒内，你一共答对了 ${stats.correct} 题。`);
        } else {
            // 开始挑战
            stats = { correct: 0, total: 0 };
            updateStats();
            timeLeft = 60;
            isTimeAttack = true;
            btn.innerText = "停止挑战";
            btn.style.background = "var(--danger)";
            display.style.display = "block";
            display.innerText = timeLeft;
            generateQuestion();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                display.innerText = timeLeft;
                if (timeLeft <= 0) {
                    toggleTimer(); // 时间到自动结束
                }
            }, 1000);
        }
    }

    // --- 快捷键 ---
    elInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            if(elSubmitBtn.style.display !== 'none') checkAnswer();
            else generateQuestion();
        }
    });

    // 初始化
    generateQuestion();
</script>

</body>
</html>
